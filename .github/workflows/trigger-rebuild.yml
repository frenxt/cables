name: trigger-rebuild

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'contributors/**'
      - 'schema/**'
      - 'scripts/**'

jobs:
  ping-vercel:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_CABLES: ${{ secrets.VERCEL_DEPLOY_HOOK_CABLES }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_CABLES" ]; then
            echo "VERCEL_DEPLOY_HOOK_CABLES secret is not set; skipping"
            exit 0
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_CABLES"
