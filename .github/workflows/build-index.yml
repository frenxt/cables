name: build-index

on:
  push:
    branches: [main]
    paths:
      - 'content/claude-code/**'
      - 'imports/**'
      - 'publishers/**'
      - 'contributors/**'
      - 'schema/**'
      - 'scripts/**'

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
        with:
          version: 10.30.1
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm sync-imports
      - run: pnpm build-index
      - name: Commit updated index if changed
        run: |
          if git diff --quiet -- content/index.json; then
            echo "No index changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/index.json
          git commit -m "chore(index): regenerate content/index.json"
          git push
