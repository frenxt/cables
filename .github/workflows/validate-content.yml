name: validate-content

on:
  pull_request:
    paths:
      - 'content/**'
      - 'imports/**'
      - 'publishers/**'
      - 'contributors/**'
      - 'schema/**'
      - 'scripts/**'
      - 'packages/cli/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

jobs:
  content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm sync-imports
      - run: pnpm validate
      - run: pnpm build-index
      - name: Ensure index is current
        # build-index stamps a fresh `generated_at` on every run, so a raw
        # `git diff --exit-code` would always fail. Compare structural content
        # instead — everything except the timestamp must match the committed
        # file. If entries drifted, this still fails.
        run: |
          set -euo pipefail
          jq 'del(.generated_at)' content/index.json > /tmp/index.rebuilt.json
          git show HEAD:content/index.json | jq 'del(.generated_at)' > /tmp/index.committed.json
          if ! diff -u /tmp/index.committed.json /tmp/index.rebuilt.json; then
            echo "::error::content/index.json is stale. Run 'pnpm build-index' locally and commit the result."
            exit 1
          fi

  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ./packages/cli typecheck
      - run: pnpm test
      - run: pnpm --filter ./packages/cli build
