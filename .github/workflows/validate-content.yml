name: validate-content

on:
  pull_request:
    paths:
      - 'content/**'
      - 'contributors/**'
      - 'schema/**'
      - 'scripts/**'
      - 'packages/cli/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

jobs:
  content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate
      - run: pnpm build-index
      - name: Ensure index is current
        run: git diff --exit-code content/index.json

  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ./packages/cli typecheck
      - run: pnpm test
      - run: pnpm --filter ./packages/cli build
